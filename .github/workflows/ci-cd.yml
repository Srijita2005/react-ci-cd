name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

# 🔥 REQUIRED PERMISSIONS (fix for GHCR push error)
permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test -- --watchAll=false

  docker:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/srijita2005/react-ci-cd:latest .
          docker build -t ghcr.io/srijita2005/react-ci-cd:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/srijita2005/react-ci-cd:latest
          docker push ghcr.io/srijita2005/react-ci-cd:${{ github.sha }}

  notify:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack Notification
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"✅ CI/CD Pipeline Successful 🚀"}' \
          ${{ secrets.SLACK_WEBHOOK }}